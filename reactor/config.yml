# Flow Synthesis — reactor / pump-control configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit these values to match your rig.  All flow rates are in µL/min.
# The app reads this file on startup; nothing here requires code changes.

# ── Pumps ────────────────────────────────────────────────────────────────────
# One entry per pump.  `address` is the serial port (/dev/ttyUSB* or COM*),
# `pump_id` the Mitos bus id (0 = broadcast).  `sensor_min`/`max_flow` come from
# the installed Dolomite LG16 flow sensor (µL/min) and are HARD LIMITS: a recipe
# whose computed setpoint for a pump is nonzero-but-below `sensor_min`, or above
# `max_flow`, is REJECTED (nothing is clamped or sent to hardware).  A true 0
# (pump off) is always allowed.  Set these to your real sensor min/max.
pumps:
  # Pumps are matched by `serial` first (fixed per pump) and the COM port is
  # resolved at runtime — so this config is PORTABLE across PCs even though COM
  # numbers differ. `address` is only a fallback if the serial isn't found.
  # Mapped via tools/reactor/map_pumps.py. pump_id is unused (one pump per port).
  # ── 30–1000 µL/min sensors (LG16-1000) — high-flow pumps ──
  pd_top_precursor:
    serial:    "4902275A"       # matched first (portable)
    address:   "COM5"           # fallback only
    sensor:    "LG16-1000"
    sensor_min: 0.0
    max_flow:   1000.0
    max_pressure: 10000.0       # mbar — pump pressure ceiling (SET to your pump's real max)
    calibration_factor: 1.0     # water→fluid flow correction (1.0 = none; = true ÷ app-water). Live-editable in the app.
    # flowrate_table:           # OPTIONAL power-law calibration (wins over calibration_factor); edit here + restart
    #   - [10, 8.6]             #   [commanded_setpoint, measured_true] in µL/min — add ≥2 real pairs, then uncomment
    #   - [20, 18.1]
    #   - [40, 38.8]
    # volume_limit: 500.0       # OPTIONAL µL: end the run if this pump delivers more than this
  ode_flush:
    serial:    "4902272A"
    address:   "COM7"
    sensor:    "LG16-1000"
    sensor_min: 0.0
    max_flow:   1000.0
    max_pressure: 10000.0
    calibration_factor: 1.0     # water→fluid flow correction (1.0 = none; = true ÷ app-water). Live-editable in the app.
    # flowrate_table:           # OPTIONAL power-law calibration (wins over calibration_factor); edit here + restart
    #   - [10, 8.6]             #   [commanded_setpoint, measured_true] in µL/min — add ≥2 real pairs, then uncomment
    #   - [20, 18.1]
    #   - [40, 38.8]
  # ── 1–50 µL/min sensors (LG16-0480) — low-flow reagent pumps ──
  oleylamine:
    serial:    "4902278A"
    address:   "COM6"
    sensor:    "LG16-0480"
    sensor_min: 0.0
    max_flow:   50.0
    max_pressure: 10000.0
    calibration_factor: 1.0     # water→fluid flow correction (1.0 = none; = true ÷ app-water). Live-editable in the app.
    # flowrate_table:           # OPTIONAL power-law calibration (wins over calibration_factor); edit here + restart
    #   - [10, 8.6]             #   [commanded_setpoint, measured_true] in µL/min — add ≥2 real pairs, then uncomment
    #   - [20, 18.1]
    #   - [40, 38.8]
  top:
    serial:    "4902280A"
    address:   "COM4"
    sensor:    "LG16-0480"
    sensor_min: 0.0
    max_flow:   50.0
    max_pressure: 10000.0
    calibration_factor: 1.0     # water→fluid flow correction (1.0 = none; = true ÷ app-water). Live-editable in the app.
    # flowrate_table:           # OPTIONAL power-law calibration (wins over calibration_factor); edit here + restart
    #   - [10, 8.6]             #   [commanded_setpoint, measured_true] in µL/min — add ≥2 real pairs, then uncomment
    #   - [20, 18.1]
    #   - [40, 38.8]
  ode_dilution:
    serial:    "4902276A"
    address:   "COM3"
    sensor:    "LG16-0480"
    sensor_min: 0.0
    max_flow:   50.0
    max_pressure: 10000.0
    calibration_factor: 1.0     # water→fluid flow correction (1.0 = none; = true ÷ app-water). Live-editable in the app.
    # flowrate_table:           # OPTIONAL power-law calibration (wins over calibration_factor); edit here + restart
    #   - [10, 8.6]             #   [commanded_setpoint, measured_true] in µL/min — add ≥2 real pairs, then uncomment
    #   - [20, 18.1]
    #   - [40, 38.8]

# ── Recipe validation bounds (editable) ──────────────────────────────────────
bounds:
  T_reac:  [180.0, 300.0]     # °C
  F_tot:   [40.0, 120.0]      # µL/min
  x_each:  [0.0, 0.3]         # each of x_ODE, x_TOP, x_oley
  x_sum_max: 0.9              # x_ODE + x_TOP + x_oley ≤ this

# ── Hard safety caps (independent of recipe bounds) ──────────────────────────
# A breach at submit time is rejected; a breach detected at runtime trips E-stop.
safety:
  T_max:        320.0         # °C absolute ceiling
  F_tot_max:    150.0         # µL/min absolute ceiling
  per_pump_max: 1000.0        # µL/min absolute per-pump ceiling
  max_pressure: 10000.0       # mbar absolute ceiling; a per-pump max_pressure overrides per pump
  # Flow-health monitoring during a run (paws-style):
  flow_sensitivity: 1.0       # µL/min: below this setpoint, judge flow by absolute error
  flow_tol:        0.2        # fractional band: |actual−target|/target within this = OK
  bad_flow_tol:    3          # consecutive out-of-band ticks before a pump is flagged
  flow_fault_estop: false     # true = E-stop on sustained bad flow; false = warn only

# ── Temperature gate (no active heater control — read-only) ──────────────────
temperature:
  tolerance:    2.0           # °C: |current − target| within this = "at temperature"
  stable_hold:  5.0           # s: must stay in-band this long before flowing
  timeout:      900.0         # s: give up arming after this → abort
  mock_ramp:    5.0           # °C/s convergence rate for the MOCK reading only
  read_interval_s: 1.0        # s: throttle live beamline temperature/bstop reads
  cooldown_c:   25.0          # °C: cool the reactor to this the moment a synthesis run ends
                              # (csettemp sent at run→flush). null/blank = leave temperature as-is.

# ── Beamline / SPEC (temperature ramp, bstop, 2D data collection) ─────────────
# The reactor commands temperature via SPEC and, during a run, fires a 2D
# acquisition ~spec_lead_s before the run ends, naming the output with the
# recipe_id so it traces through the pipeline back to the optimizer.
spec:
  backend:     "mock"         # startup default; at runtime the reactor Mock/Real
                              # toggle governs BOTH pumps and beamline together
  base_url:    "http://127.0.0.1:18085/SIS/"   # bServer (same machine as the reactor)
  enabled:     true           # fire the 2D collection during a run
  spec_lead_s: 180.0          # collect this long before the end of run (sample) AND flush (background)
  exposure_s:  10.0           # per-frame exposure passed to the collect macro
  frames:      10             # frames per acquisition
  data_dir:    "/msd_data/checkout/bl1-5/staff_data/Partha/AutoSynth/Auto_Test"   # beamline save dir (Linux path SPEC writes to) = pipeline 2D base
  # Auto-follow the hub folder: when the hub switches project folder, set data_dir
  # to match it. The hub folder is a Windows path but SPEC needs the Linux path, so
  # it's translated by swapping the prefix below (⚠ CONFIRM both prefixes on the rig).
  data_dir_from_hub: true
  hub_path_map:
    from: "X:\\bl1-5"                    # Windows prefix the hub picks
    to:   "/msd_data/checkout/bl1-5"     # matching Linux prefix SPEC writes to
  # filename role tags → {recipe_id}_{sample_tag} (during run) and
  # {recipe_id}_{bkg_tag} (during flush). Shared recipe_id pairs them for subtraction.
  sample_tag:  "sample"
  bkg_tag:     "bkg"
  # ── Live monitors: read from EPICS (recommended) or SPEC counters ───────────
  # "epics": read temperature/i0/bstop straight from EPICS via caget — independent
  #          of SPEC, so NO remote control, NO ct refresh, and the live plot keeps
  #          updating DURING a data collection. Needs pyepics + channel access to
  #          the beamline. Verify PVs first: tools/beamline_epics_test.py.
  # "spec":  legacy — read SPEC counters (needs read_refresh_cmd / ct; see below).
  read_source: "spec"
  epics_pvs:                  # ⚠ CONFIRM PV names with the beamline engineer
    temperature: "BL01-5:Aux1Temp.G"
    i0:          "BL01-5:AuxInput.A"
    bstop:       "BL01-5:AuxInput.B"
  # If the PVs won't connect ("cannot connect to ..."), set the Channel Access
  # address to the IOC/gateway IP for BL1-5 (ask the beamline engineer). Leave
  # blank to use CA auto-discovery (broadcast).
  epics_ca_addr_list: "134.79.46.44:5100"   # CA server/gateway (ip:port) from the beamline engineer
  epics_ca_auto_addr_list: "NO" # used only when epics_ca_addr_list is set
  # ── site-specific SPEC strings (used only when read_source: "spec") ──────────
  read_during_collect: false  # true = keep polling temp/bstop/I0 DURING a collection
                              # (only if the bServer allows counter reads mid-scan)
  temp_counter: "CTEMP"       # counter name that reports the temperature readback (BL1-5)
  bstop_counter: "bstop"
  i0_counter:   "i0"
  # get_all_counters returns SPEC's LAST-count values (stale until a count runs),
  # so temp/bstop/I0 read frozen. read_refresh_cmd is run before each read to
  # update them. "ct 0.1" refreshes all counters but ⚠ MAY OPEN THE SHUTTER —
  # prefer a shutter-free temperature-query macro if the beamline has one.
  # Leave blank to read raw last-count values (no refresh).
  read_refresh_cmd: "ct 0.1"  # refresh counters before each read so the live plot is LIVE
                              # (blank = show stale last-count values). ⚠ obeys sauto —
                              # run "sauto off" if you don't want ct opening the shutter.
  set_temp_cmd: "csettemp {T}"        # ramp command (from MSD.py)
  # ── data collection: preferred = a .txt SPEC macro that we fill in ──────────
  # The macro owns exposure/frames/detector setup; the reactor substitutes these
  # {{token}} markers before sending: {{sample}} {{main_folder}} {{path}}
  # {{recipe_id}} {{temperature}} {{exposure}} {{frames}}.
  macro_file:     "reactor/macros/Singlesnapshot.flat.template.txt"   # FLAT (no-variable) macro for commands mode; blank = named-cmd mode
  # collect_mode: how the filled macro reaches SPEC —
  #   "commands" (DEFAULT, robust): stream the macro's lines to SPEC one-by-one
  #              via the bServer. No file is written; SPEC does its own file I/O
  #              using the paths inside the macro. Works even if SPEC is a
  #              DIFFERENT host from this PC (no shared mount needed).
  #   "qdo":     write the filled macro to a file, then `qdo` it. Only use this if
  #              macro_out_file is on a path SPEC itself can open (a shared mount).
  collect_mode:   "commands"
  macro_out_file: ""                  # (qdo mode only) SPEC-readable path to write to; blank = next to macro_file
  qdo_cmd:        'qdo "{file}"'      # (qdo mode only) how SPEC runs the filled macro file
  # ── fallback named-command mode (used only if macro_file is blank) ──────────
  newfile_cmd:  "newfile {path}"      # sets detector save dir + filename prefix
  collect_cmd:  "ct {exposure}"       # 2D acquisition command

# ── Arming mode (how a run decides it is ready to start the pumps) ────────────
# Each recipe may override these (form radio / JSON "arm_mode" + "arm_wait_s").
#   temperature — wait for the reactor to reach & hold T_reac (needs a wired
#                 temperature reading; uses the temperature.* settings above).
#   timed       — wait a fixed number of seconds, then start the pumps
#                 regardless of temperature. Use when no thermocouple is
#                 connected to this machine.
arming:
  default_mode:   "timed"     # "temperature" or "timed"
  default_wait_s: 120.0       # s: wait in timed mode when a recipe omits arm_wait_s

# ── Run lifecycle ────────────────────────────────────────────────────────────
run:
  default_duration: 600.0     # s fallback run time = 10 min (recipe may override)
  end_on_measurement: true    # end the run when a new SAXS averaged file appears
  # Autonomous loop: hold each condition (keep flowing) until the NEXT param
  # file is queued, then flush + advance. Runs continuously as long as the
  # ML/processing pipeline keeps writing new files into the recipes folder.
  advance_on_new_file: true   # true = hold-until-next-file; false = use duration
  min_dwell_s: 60.0           # min seconds a condition runs before it can advance

# ── Flush / clean ────────────────────────────────────────────────────────────
flush:
  rate:      50.0            # µL/min on the flush pump (ode_dilution max = 50)
  duration:  1200.0          # s = 20 min
  pump:      "ode_dilution"  # which pump flushes; switchable in the app. Default is
                             # ode_dilution (same ODE) while ode_flush is down; switch
                             # to "ode_flush" once fixed. A reagent flush pump is capped
                             # at its own max_flow (ode_dilution ≤ 50 µL/min, auto-clamped).

# ── Folders (relative to the project root unless absolute) ───────────────────
folders:
  # Watched for incoming condition files (*.dat/*.txt from the ML pipeline, or *.json).
  # Defaults to a sibling of Subtracted in the 1D tree; change it live in the app
  # (📁 Conditions folder card) — the override persists in reactor_settings.json.
  recipes:   "1D/SAXS/Conditions"          # same level as 1D/SAXS/Subtracted
  processed: "1D/SAXS/Conditions/done"     # files moved here after intake
  feedback:  "reactor/feedback"            # <recipe_id>.done.json written here
  averaged_watch: "1D/SAXS/Averaged"       # backstop watch for run-end (bus is primary)

poll_interval: 3.0            # s, folder polling
