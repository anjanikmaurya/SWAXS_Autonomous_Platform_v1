# Flow Synthesis — reactor / pump-control configuration
# ─────────────────────────────────────────────────────────────────────────────
# Edit these values to match your rig.  All flow rates are in µL/min.
# The app reads this file on startup; nothing here requires code changes.

# ── Pumps ────────────────────────────────────────────────────────────────────
# One entry per pump.  `address` is the serial port (/dev/ttyUSB* or COM*),
# `pump_id` the Mitos bus id (0 = broadcast).  `sensor_min`/`max_flow` come from
# the installed Dolomite LG16 flow sensor (µL/min) and are HARD LIMITS: a recipe
# whose computed setpoint for a pump is nonzero-but-below `sensor_min`, or above
# `max_flow`, is REJECTED (nothing is clamped or sent to hardware).  A true 0
# (pump off) is always allowed.  Set these to your real sensor min/max.
pumps:
  # Pumps are matched by `serial` first (fixed per pump) and the COM port is
  # resolved at runtime — so this config is PORTABLE across PCs even though COM
  # numbers differ. `address` is only a fallback if the serial isn't found.
  # Mapped via tools/reactor/map_pumps.py. pump_id is unused (one pump per port).
  # ── 30–1000 µL/min sensors (LG16-1000) — high-flow pumps ──
  pd_top_precursor:
    serial:    "4902275A"       # matched first (portable)
    address:   "COM5"           # fallback only
    sensor:    "LG16-1000"
    sensor_min: 30.0
    max_flow:   1000.0
    max_pressure: 10000.0       # mbar — pump pressure ceiling (SET to your pump's real max)
  ode_flush:
    serial:    "4902272A"
    address:   "COM7"
    sensor:    "LG16-1000"
    sensor_min: 30.0
    max_flow:   1000.0
    max_pressure: 10000.0
  # ── 1–50 µL/min sensors (LG16-0480) — low-flow reagent pumps ──
  oleylamine:
    serial:    "4902278A"
    address:   "COM6"
    sensor:    "LG16-0480"
    sensor_min: 1.0
    max_flow:   50.0
    max_pressure: 10000.0
  top:
    serial:    "4902280A"
    address:   "COM4"
    sensor:    "LG16-0480"
    sensor_min: 1.0
    max_flow:   50.0
    max_pressure: 10000.0
  ode_dilution:
    serial:    "4902276A"
    address:   "COM3"
    sensor:    "LG16-0480"
    sensor_min: 1.0
    max_flow:   50.0
    max_pressure: 10000.0

# ── Recipe validation bounds (editable) ──────────────────────────────────────
bounds:
  T_reac:  [180.0, 300.0]     # °C
  F_tot:   [40.0, 120.0]      # µL/min
  x_each:  [0.0, 0.3]         # each of x_ODE, x_TOP, x_oley
  x_sum_max: 0.9              # x_ODE + x_TOP + x_oley ≤ this

# ── Hard safety caps (independent of recipe bounds) ──────────────────────────
# A breach at submit time is rejected; a breach detected at runtime trips E-stop.
safety:
  T_max:        320.0         # °C absolute ceiling
  F_tot_max:    150.0         # µL/min absolute ceiling
  per_pump_max: 1000.0        # µL/min absolute per-pump ceiling
  max_pressure: 10000.0       # mbar absolute ceiling; a per-pump max_pressure overrides per pump

# ── Temperature gate (no active heater control — read-only) ──────────────────
temperature:
  tolerance:    2.0           # °C: |current − target| within this = "at temperature"
  stable_hold:  5.0           # s: must stay in-band this long before flowing
  timeout:      900.0         # s: give up arming after this → abort
  mock_ramp:    5.0           # °C/s convergence rate for the MOCK reading only
  read_interval_s: 1.0        # s: throttle live beamline temperature/bstop reads

# ── Beamline / SPEC (temperature ramp, bstop, 2D data collection) ─────────────
# The reactor commands temperature via SPEC and, during a run, fires a 2D
# acquisition ~spec_lead_s before the run ends, naming the output with the
# recipe_id so it traces through the pipeline back to the optimizer.
spec:
  backend:     "mock"         # "mock" (simulate) | "real" (talk to the SPEC bServer)
  base_url:    "http://127.0.0.1:18085/SIS/"   # bServer (same machine as the reactor)
  enabled:     true           # fire the 2D collection during a run
  spec_lead_s: 180.0          # collect this long before the end of run (sample) AND flush (background)
  exposure_s:  1.0            # per-frame exposure passed to the collect macro
  frames:      1              # frames per acquisition
  data_dir:    ""             # ⚠ SET on rig: beamline save dir = the pipeline 2D folder
  # filename role tags → {recipe_id}_{sample_tag} (during run) and
  # {recipe_id}_{bkg_tag} (during flush). Shared recipe_id pairs them for subtraction.
  sample_tag:  "sample"
  bkg_tag:     "bkg"
  # ── site-specific SPEC strings — ⚠ CONFIRM these on the beamline ────────────
  read_during_collect: false  # true = keep polling temp/bstop/I0 DURING a collection
                              # (only if the bServer allows counter reads mid-scan)
  temp_counter: "temp"        # counter name that reports the temperature readback
  bstop_counter: "bstop"
  i0_counter:   "i0"
  set_temp_cmd: "csettemp {T}"        # ramp command (from MSD.py)
  # ── data collection: preferred = a .txt SPEC macro that we fill in and qdo ──
  # The macro owns exposure/frames/detector setup; the reactor substitutes these
  # placeholders before sending: {path} {recipe_id} {temperature} {exposure} {frames}
  macro_file:     ""                  # path to your collection macro template (.txt); blank = named-cmd mode
  macro_out_file: ""                  # where the filled macro is written for qdo (SPEC-readable); blank = next to macro_file
  qdo_cmd:        'qdo "{file}"'      # how SPEC runs the filled macro file
  # ── fallback named-command mode (used only if macro_file is blank) ──────────
  newfile_cmd:  "newfile {path}"      # sets detector save dir + filename prefix
  collect_cmd:  "ct {exposure}"       # 2D acquisition command

# ── Arming mode (how a run decides it is ready to start the pumps) ────────────
# Each recipe may override these (form radio / JSON "arm_mode" + "arm_wait_s").
#   temperature — wait for the reactor to reach & hold T_reac (needs a wired
#                 temperature reading; uses the temperature.* settings above).
#   timed       — wait a fixed number of seconds, then start the pumps
#                 regardless of temperature. Use when no thermocouple is
#                 connected to this machine.
arming:
  default_mode:   "timed"     # "temperature" or "timed"
  default_wait_s: 120.0       # s: wait in timed mode when a recipe omits arm_wait_s

# ── Run lifecycle ────────────────────────────────────────────────────────────
run:
  default_duration: 600.0     # s fallback run time = 10 min (recipe may override)
  end_on_measurement: true    # end the run when a new SAXS averaged file appears
  # Autonomous loop: hold each condition (keep flowing) until the NEXT param
  # file is queued, then flush + advance. Runs continuously as long as the
  # ML/processing pipeline keeps writing new files into the recipes folder.
  advance_on_new_file: true   # true = hold-until-next-file; false = use duration
  min_dwell_s: 60.0           # min seconds a condition runs before it can advance

# ── Flush / clean ────────────────────────────────────────────────────────────
flush:
  rate:      100.0            # µL/min on ode_flush
  duration:  1200.0          # s = 20 min

# ── Folders (relative to the project root unless absolute) ───────────────────
folders:
  # Watched for incoming condition files (*.dat/*.txt from the ML pipeline, or *.json).
  # Defaults to a sibling of Subtracted in the 1D tree; change it live in the app
  # (📁 Conditions folder card) — the override persists in reactor_settings.json.
  recipes:   "1D/SAXS/Conditions"          # same level as 1D/SAXS/Subtracted
  processed: "1D/SAXS/Conditions/done"     # files moved here after intake
  feedback:  "reactor/feedback"            # <recipe_id>.done.json written here
  averaged_watch: "1D/SAXS/Averaged"       # backstop watch for run-end (bus is primary)

poll_interval: 3.0            # s, folder polling
